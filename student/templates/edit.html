{% load static %}
<!doctype html>
<html lang="en">

<head>
  <title>Student Management System-edit </title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <!-- Bootstrap JS -->
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      height: 100%;
      overflow-x: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    video.bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .center-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      min-height: 100%;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    .card {
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      text-align: center;
      width: 100%;
      max-width: 1000px;
    }

    h1 {
      font-size: 3rem;
      color: #e0ffff;
      margin-bottom: 20px;
      text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.6);
    }

    p {
      font-size: 1.2rem;
      color: lavender;
      text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.6);
    }

    .btn-custom {
      background-color: deepskyblue;
      color: white;
      border-radius: 25px;
      padding: 10px 25px;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 191, 255, 0.3);
      text-decoration: none;
    }

    .btn-custom:hover {
      background-color: dodgerblue;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(30, 144, 255, 0.5);
    }

    table {
      width: 100%;
      margin-top: 30px;
      border-collapse: collapse;
      color: white;
      background-color: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      overflow: hidden;
    }

    th,
    td {
      padding: 12px;
      border: 1px solid rgba(0, 191, 255, 0.5);
      text-align: center;
      vertical-align: middle;
      color: white;
    }

    th {
      background-color: rgba(46, 15, 77, 0.4);
      color: #ffffff;
      font-weight: bold;
      text-shadow: 1px 1px 3px #000;
    }

    tbody tr:hover {
      background-color: rgba(0, 191, 255, 0.2);
      transition: background-color 0.3s ease;
    }

    td img {
      max-height: 120px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .modal-content {
      background-color: rgb(33, 0, 46) !important;
      z-index: 1050 !important;
    }

    .modal-backdrop {
      z-index: 1040 !important;
      background-color: transparent !important;
    }

    .modal-backdrop.show {
      background-color: transparent !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      opacity: 0 !important;
    }




    .modal {
      z-index: 1050 !important;
    }

    body.modal-open {
      overflow: auto !important;
      padding-right: 0 !important;
    }

    .modal-body label {
      font-weight: 600;
      margin-bottom: 5px;
      color: #333;
    }

    .form-control,
    .form-control-file,
    textarea {
      border-radius: 12px;
      border: 1px solid #ccc;
      transition: 0.3s ease;
      background-color: rgb(40, 4, 77);
      color: white !important;
    }

    .form-control:focus,
    textarea:focus {
      border-color: deepskyblue;
      box-shadow: 0 0 8px rgba(0, 191, 255, 0.4);
      color: #000 !important;
    }

    /* Make modal title more visible */
    .modal-title {
      color: #00bfff !important;
      /* bright cyan */
      font-weight: bold;
    }

    /* Make form labels in modal brighter */
    .modal-body label {
      color: #e0e0e0 !important;
      /* light grey */
      font-weight: 600;
      text-shadow: 1px 1px 2px #000;
    }

    /* Placeholder Text Color */
    .form-control::placeholder,
    textarea::placeholder {
      color: #ccc !important;
      /* light grey placeholder */
      opacity: 1;
      /* force visibility */
    }

    .modal-footer .btn-custom {
      background: linear-gradient(to right, deepskyblue, dodgerblue);
      border: none;
      color: white;
    }

    .modal-footer .btn-custom:hover {
      background: linear-gradient(to right, dodgerblue, deepskyblue);
      transform: translateY(-1px);
    }

    input::placeholder {
      color: #b0b0b0 !important;
    }

    input,
    textarea {
      color: #ffffff !important;
    }
  </style>
  <script>
    $(document).ready(function () {
      $('#addVehicleModal').on('show.bs.modal', function () {
        $('body').css('padding-right', '0');
      });

      // Optional: Disable backdrop fade effect
      $('#addVehicleModal').modal({
        backdrop: false,
        keyboard: true,
        show: false
      });
    });
  </script>

</head>

<body>

  <!-- Video Background -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="{% static 'videos/the-drive-on-the-road-at-sunset.3840x2160.mp4' %}" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Main Card Content -->
  <div class="center-container">
    <div class="card">
      <h1>Edit the Student</h1>
      <form action="" method="post">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Name" class="form-control shadow-sm mb-3"
          value="{{ student.name }}">
        <input type="email" name="email" id="email" class="form-control shadow-sm mb-3" placeholder="Email"
          value="{{ student.email }}">
        <input type="number" name="age" placeholder="Age" class="form-control shadow-sm mb-3" value="{{ student.age }}">
        <input type="text" name="course" placeholder="Course" class="form-control shadow-sm mb-3"
          value="{{ student.course }}">
        <button type="submit" class=" btn btn-custom">Submit</button>
        <button onclick="window.history.back()" class="btn btn-custom">
          Back
        </button>
      </form>





    </div> <!-- End of .card -->
  </div> <!-- End of .center-container -->

</body>

</html>
