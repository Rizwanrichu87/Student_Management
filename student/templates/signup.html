{% load static %}
<!doctype html>
<html lang="en">

<head>
  <title>Student Management system-Sign up</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <!-- Bootstrap JS -->
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      height: 100%;
      overflow-x: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    video.bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .center-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      min-height: 100%;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    .card {
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      text-align: center;
      width: 100%;
      max-width: 1000px;
    }

    h1 {
      font-size: 3rem;
      color: #e0ffff;
      margin-bottom: 20px;
      text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.6);
    }

    p {
      font-size: 1.2rem;
      color: lavender;
      text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.6);
    }

    .btn-custom {
      background-color: deepskyblue;
      color: white;
      border-radius: 25px;
      padding: 10px 25px;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 191, 255, 0.3);
      text-decoration: none;
    }

    .btn-custom:hover {
      background-color: dodgerblue;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(30, 144, 255, 0.5);
    }

    table {
      width: 100%;
      margin-top: 30px;
      border-collapse: collapse;
      color: white;
      background-color: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      overflow: hidden;
    }

    th,
    td {
      padding: 12px;
      border: 1px solid rgba(0, 191, 255, 0.5);
      text-align: center;
      vertical-align: middle;
      color: white;
    }

    th {
      background-color: rgba(46, 15, 77, 0.4);
      color: #ffffff;
      font-weight: bold;
      text-shadow: 1px 1px 3px #000;
    }

    tbody tr:hover {
      background-color: rgba(0, 191, 255, 0.2);
      transition: background-color 0.3s ease;
    }

    td img {
      max-height: 120px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .modal-content {
      background-color: rgb(33, 0, 46) !important;
      z-index: 1050 !important;
    }

    .modal-backdrop {
      z-index: 1040 !important;
      background-color: transparent !important;
    }

    .modal-backdrop.show {
      background-color: transparent !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      opacity: 0 !important;
    }

    input::placeholder {
      color: #b0b0b0 !important;
    }

    input,
    textarea {
      color: #ffffff !important;
    }


    .modal {
      z-index: 1050 !important;
    }

    body.modal-open {
      overflow: auto !important;
      padding-right: 0 !important;
    }

    .modal-body label {
      font-weight: 600;
      margin-bottom: 5px;
      color: #333;
    }

    .form-control,
    .form-control-file,
    textarea {
      border-radius: 12px;
      border: 1px solid #ccc;
      transition: 0.3s ease;
      background-color: rgb(40, 4, 77);
      color: white !important;
    }

    .form-control:focus,
    textarea:focus {
      border-color: deepskyblue;
      box-shadow: 0 0 8px rgba(0, 191, 255, 0.4);
      color: #000 !important;
    }

    /* Placeholder Text Color */
    .form-control::placeholder,
    textarea::placeholder {
      color: #ccc !important;
      /* light grey placeholder */
      opacity: 1;
      /* force visibility */
    }

    .modal-footer .btn-custom {
      background: linear-gradient(to right, deepskyblue, dodgerblue);
      border: none;
      color: white;
    }

    .modal-footer .btn-custom:hover {
      background: linear-gradient(to right, dodgerblue, deepskyblue);
      transform: translateY(-1px);
    }

    /* Popup Styles */
    @keyframes fadeSlide {
      0% {
        opacity: 0;
        transform: translateY(-30px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .popup-glass {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      animation: fadeSlide 0.6s ease;
    }

    .popup-content {
      background-color: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 20px 30px;
      border-radius: 15px;
      text-align: center;
      min-width: 300px;
      max-width: 90vw;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      position: relative;
    }

    .popup-close {
      position: absolute;
      top: 8px;
      right: 12px;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }
  
    /* Theme Toggle Overrides */
    body.light-mode .card { background-color: rgba(255, 255, 255, 0.85); color: #1a1a1a; border: 1px solid #ccc; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); }
    body.light-mode h1 { color: #005580; text-shadow: none; }
    body.light-mode p { color: #444; text-shadow: none; }
    body.light-mode table { background-color: rgba(255, 255, 255, 0.9); color: #000; border: 1px solid #ddd; }
    body.light-mode th { background-color: rgba(0, 0, 0, 0.05); color: #000; text-shadow: none; }
    body.light-mode td { color: #000; }
    body.light-mode .modal-content { background-color: #ffffff !important; border: 1px solid #ddd; }
    body.light-mode .form-control, body.light-mode textarea { background-color: #fff; color: #000 !important; border: 1px solid #ccc; }
    body.light-mode .modal-body label { color: #111 !important; text-shadow: none; }
    body.light-mode .modal-title { color: #005580 !important; }
    body.light-mode .popup-content { background-color: rgba(255,255,255,0.9); color: #000; }

  </style>
  <script>

    function toggleTheme() {
      document.body.classList.toggle('light-mode');
      localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }
    document.addEventListener("DOMContentLoaded", () => {
      if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
    });

    $(document).ready(function () {
      $('#addVehicleModal').on('show.bs.modal', function () {
        $('body').css('padding-right', '0');
      });

      // Optional: Disable backdrop fade effect
      $('#addVehicleModal').modal({
        backdrop: false,
        keyboard: true,
        show: false
      });
    });
    $(document).ready(function () {
      $('.toast').toast('show');
    });
    function closePopup() {
      var popup = document.getElementById("popup-message");
      if (popup) {
        popup.style.display = "none";
      }
    }

    // Auto-hide after 5 seconds
    setTimeout(closePopup, 5000);
  </script>


</head>

<body>

  <!-- Video Background -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="{% static 'videos/mylivewallpapers-com-BMW-M4-City-Drive-4K.mp4' %}" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Main Card Content -->
  <button id="theme-toggle" class="btn btn-custom mb-3" style="position: fixed; top: 20px; right: 20px; z-index: 1000;" onclick="toggleTheme()">🌓 Toggle Mode</button>
  <div class="center-container">
    <div class="card">
      <h1>Create an user</h1>
      <form action="{% url 'signup' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
          <label for="first_name">First name</label>
          <input type="text" name="first_name" id="first_name" placeholder="Enter First Name"
            class="form-control shadow-sm">
        </div>
        <div class="form-group">
          <label for="last_name">Last name</label>
          <input type="text" name="last_name" id="last_name" class="form-control shadow-sm"
            placeholder="Enter Last Name">
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" name="username" id="username" placeholder="Enter username" class="form-control shadow-sm"
            value="">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" class="form-control shadow-sm" id="email" name="email" placeholder="Enter email">
        </div>
        <div class="form-group">
          <label for="password1">Enter password</label>
          <input type="password" class="form-control shadow-sm" id="password1" name="password1"
            placeholder="Enter password">
        </div>
        <div class="form-group">
          <label for="password2">Confirm password</label>
          <input type="password" class="form-control shadow-sm" id="password2" name="password2"
            placeholder="Confirm password">
        </div>
        <button type="submit" class="btn btn-custom">👤Sign Up</button>
        <a href="{% url 'login' %}" class="btn btn-custom">
          Back
        </a>

      </form>

      </div> <!-- End of .card -->
  </div> <!-- End of .center-container -->

{% if messages %}
      <div id="popup-message" class="popup-glass animate__animated animate__fadeInDown">
        {% for message in messages %}
        <div class="popup-content bg-{{ message.tags }}">
          <span class="popup-close" onclick="closePopup()">&times;</span>
          <strong>{{ message.tags|title }}:</strong> {{ message }}
        </div>
        {% endfor %}
      </div>
      {% endif %}



    
</body>

</html>
